<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURO-SNAKE // SYS.AUDIO</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"VT323"', 'monospace'],
          },
          colors: {
            cyan: { 400: '#00ffff', 500: '#00cccc' },
            magenta: { 400: '#ff00ff', 500: '#cc00cc' },
            dark: '#050505',
          },
          animation: {
            'pulse-fast': 'pulse 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <!-- Custom Glitch & CRT Styles -->
  <style>
    body {
      background-color: #050505;
      color: #00ffff;
      overflow: hidden;
    }

    /* CRT Scanlines */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.2) 50%,
        rgba(0, 0, 0, 0.2)
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 50;
    }

    /* Screen Flicker */
    .flicker {
      animation: crt-flicker 0.15s infinite;
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 255, 255, 0.02);
      z-index: 49;
    }

    @keyframes crt-flicker {
      0% { opacity: 0.9; }
      50% { opacity: 1; }
      100% { opacity: 0.8; }
    }

    /* Glitch Text Animations */
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
      100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); }
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
      20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
      40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
      60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); }
      80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
      100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); }
    }

    .glitch-wrapper {
      position: relative;
      display: inline-block;
    }

    .glitch-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }

    .glitch-cyan {
      color: #00ffff;
      left: 2px;
      text-shadow: -1px 0 #ff00ff;
      animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
    }

    .glitch-magenta {
      color: #ff00ff;
      left: -2px;
      text-shadow: 1px 0 #00ffff;
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; border-left: 1px solid #00ffff; }
    ::-webkit-scrollbar-thumb { background: #ff00ff; }
  </style>

  <!-- Import Map -->
  </head>
<body class="font-mono antialiased selection:bg-magenta-400 selection:text-dark">
  <div class="scanlines"></div>
  <div class="flicker"></div>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
